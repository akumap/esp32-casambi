# ESP32 Casambi Controller - PlatformIO Configuration

# =============================================================================
# COMMON CONFIGURATION
# =============================================================================
[common]
lib_deps =
    bblanchon/ArduinoJson @ 7.0.0
    esphome/ESPAsyncWebServer-esphome @ 3.2.2
    esphome/AsyncTCP-esphome @ 2.1.4

# Common build flags for all environments
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DCONFIG_ASYNC_TCP_RUNNING_CORE=1
    -DCONFIG_ASYNC_TCP_USE_WDT=0

# Upload settings
upload_speed = 115200
monitor_speed = 115200
monitor_filters =
    esp32_exception_decoder
    colorize

# =============================================================================
# ESP32 DevKit V4 (Primary target)
# =============================================================================
[env:devkit-v4]
platform = espressif32
board = az-delivery-devkit-v4
framework = arduino

# Storage and partitions
board_build.filesystem = littlefs
board_build.partitions = huge_app.csv

# Libraries
lib_deps = ${common.lib_deps}

# Build configuration
build_flags =
    ${common.build_flags}
#    -DBOARD_HAS_PSRAM
#    -mfix-esp32-psram-cache-issue

# Upload/Monitor
upload_speed = ${common.upload_speed}
monitor_speed = ${common.monitor_speed}
monitor_filters = ${common.monitor_filters}

# =============================================================================
# ESP32-C3 DevKit M1 (Alternative board)
# =============================================================================
[env:esp32-c3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino

# Storage and partitions
board_build.filesystem = littlefs
board_build.partitions = huge_app.csv

# Libraries
lib_deps = ${common.lib_deps}

# Build configuration (C3 specific)
build_flags =
    ${common.build_flags}
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

# Upload/Monitor
upload_speed = ${common.upload_speed}
monitor_speed = ${common.monitor_speed}
monitor_filters = ${common.monitor_filters}

# =============================================================================
# DEBUG BUILD (Enable verbose logging)
# =============================================================================
[env:debug]
extends = env:devkit-v4
build_type = debug
build_flags =
    ${env:devkit-v4.build_flags}
    -DCORE_DEBUG_LEVEL=3
    -DDEBUG_ESP_PORT=Serial
    -DDEBUG_ESP_HTTP_SERVER
    -DDEBUG_ESP_WIFI
    -O0
    -ggdb

monitor_filters =
    esp32_exception_decoder
    log2file
    colorize
    time

# =============================================================================
# RELEASE BUILD (Optimized for size and speed)
# =============================================================================
[env:release]
extends = env:devkit-v4
build_type = release
build_flags =
    ${env:devkit-v4.build_flags}
    -Os
    -ffunction-sections
    -fdata-sections
    -Wl,--gc-sections
    -DNDEBUG
